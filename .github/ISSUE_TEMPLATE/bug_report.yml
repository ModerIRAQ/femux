name: Bug report
description: Report a reproducible problem in Femux
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Open app
        2. Split pane with Ctrl+D
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Femux version
      placeholder: e.g. v1.0.0 or commit hash
  - type: input
    id: flutter-version
    attributes:
      label: Flutter version
      placeholder: Output of `flutter --version`
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste relevant logs or stack traces.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this issue on the latest main branch.
          required: false
