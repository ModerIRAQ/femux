name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      should_release: ${{ steps.meta.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata from pubspec
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version_line="$(grep '^version:' pubspec.yaml | head -n1 || true)"
          if [ -z "$version_line" ]; then
            echo "::error::Could not find a version in pubspec.yaml."
            exit 1
          fi

          raw_version="${version_line#version:}"
          raw_version="$(echo "$raw_version" | xargs)"
          release_version="${raw_version%%+*}"
          release_tag="v${release_version}"

          if [ -z "$release_version" ]; then
            echo "::error::Version in pubspec.yaml is empty."
            exit 1
          fi

          if ! [[ "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$release_version' must map to a valid tag like v1.2.3 or v1.2.3-rc.1."
            exit 1
          fi

          should_release=true

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${release_tag}" > /dev/null; then
            tag_commit="$(git rev-list -n 1 "${release_tag}")"
            if [ "$tag_commit" = "$GITHUB_SHA" ]; then
              should_release=false
              echo "Tag ${release_tag} already exists for this commit. Skipping duplicate publish."
            else
              echo "::error::Tag ${release_tag} already exists on commit ${tag_commit}. Bump pubspec.yaml version before merging to main."
              exit 1
            fi
          fi

          {
            echo "release_version=${release_version}"
            echo "release_tag=${release_tag}"
            echo "should_release=${should_release}"
          } >> "$GITHUB_OUTPUT"

      - name: Release summary
        shell: bash
        run: |
          echo "version=${{ steps.meta.outputs.release_version }}"
          echo "tag=${{ steps.meta.outputs.release_tag }}"
          echo "should_release=${{ steps.meta.outputs.should_release }}"

  build-windows:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          ISCC.exe "/DMyAppVersion=${{ needs.prepare-release.outputs.release_version }}" "packaging/windows/femux.iss"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/windows/*.exe

  build-linux:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev dpkg-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Build .deb package
        run: bash packaging/linux/build_deb.sh "${{ needs.prepare-release.outputs.release_version }}"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/linux/*.deb

  build-macos:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Build .dmg package
        run: bash packaging/macos/build_dmg.sh "${{ needs.prepare-release.outputs.release_version }}"

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos/*.dmg

  already-released:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip duplicate release
        run: |
          echo "Release ${{ needs.prepare-release.outputs.release_tag }} already exists for this commit. No new release was created."

  publish-release:
    needs: [prepare-release, build-windows, build-linux, build-macos]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: Femux ${{ needs.prepare-release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(needs.prepare-release.outputs.release_version, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.dmg
