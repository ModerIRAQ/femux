name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*' | Select-Object -First 1
          $version = ($line.Line -replace '^version:\s*', '').Trim()
          $version = $version.Split('+')[0]
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build installer
        shell: pwsh
        run: |
          ISCC.exe "/DMyAppVersion=${{ steps.version.outputs.version }}" "packaging/windows/femux.iss"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/windows/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev dpkg-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Resolve version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -n1 | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: bash packaging/linux/build_deb.sh "${{ steps.version.outputs.version }}"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/linux/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Resolve version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -n1 | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build .dmg package
        run: bash packaging/macos/build_dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos/*.dmg

  publish-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.dmg
